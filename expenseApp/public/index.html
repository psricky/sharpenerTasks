<!-- ========================= FRONTEND : index.html ========================= -->
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login + Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>
</head>

<body>
  <!-- ================= LOGIN PAGE ================= -->

  <div class="login-box" id="loginSection">

    <h2>User Login</h2>

    <form id="loginForm">

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required>
      </div>

      <button type="submit">Login</button>
      <button class="signup-btn" id="signupBtn">Sign Up</button>

    </form>

  </div>
  <!-- ================= SIGN UP PAGE ================= -->

  <div class="login-box" id="signupSection">

    <h2>User Sign Up</h2>

    <form id="signupForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signupEmail" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signuppassword" required>
      </div>

      <button type="submit">Submit</button>

    </form>

  </div>
  <!-- ================= EXPENSE APP ================= -->
  <div class="card" id="expenseSection">
    <div style="display: flex;justify-content: space-between;">

      <h2>Expense Tracker</h2>
      <div style="display: flex;gap: 5px;">
        <button id="premiumBtn" class="premium-btn">Buy Premium Membership</button>
        <h2 id="premiumStatusText">Premium Member</h2>
        <button onclick="logout()">Logout</button>
      </div>
    </div>


    <form id="expenseForm">

      <div class="form-group">
        <label>Money Spent</label>
        <input type="number" id="amount" required>
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea id="description" required></textarea>
      </div>

      <div class="form-group">
        <label>Category</label>
        <select id="category" required>
          <option value="">Select Category</option>
          <option>Food</option>
          <option>Petrol</option>
          <option>Salary</option>
          <option>Shopping</option>
          <option>Travel</option>
          <option>Other</option>
        </select>
      </div>

      <button type="submit">Add Expense</button>

    </form>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Amount</th>
          <th>Description</th>
          <th>Category</th>
        </tr>
      </thead>

      <tbody id="expenseTable"></tbody>
    </table>
    <button type="button" id="leaderboardBtn">Show Leaderboard</button>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>
  <script src="index.js"></script>
</body>

</html>
