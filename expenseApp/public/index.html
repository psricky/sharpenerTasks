<!-- ========================= FRONTEND : index.html ========================= -->
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login + Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>
</head>

<body>

  <!-- ================= LOGIN PAGE ================= -->

  <div class="login-box" id="loginSection">

    <h2>User Login</h2>

    <form id="loginForm">

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required>
      </div>

      <button type="submit">Login</button>
      <button class="signup-btn" id="signupBtn">Sign Up</button>

    </form>
    <button style="margin-top: 1rem;" id="forgotBtn">Forgot Password?</button>
    <form id="forgotForm" style="display: none;">
      <div class="form-group">
        <label>Enter your email to reset password</label>
        <input type="email" id="forgotEmail" required>
        <button style="margin-top: 1rem;" id="forgotSubmitBtn">Submit</button>
      </div>
    </form>
  </div>

  <!-- ================= SIGN UP PAGE ================= -->

  <div class="login-box" id="signupSection">

    <h2>User Sign Up</h2>

    <form id="signupForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signupEmail" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signuppassword" required>
      </div>

      <button type="submit">Submit</button>

    </form>

  </div>
  <!-- ================= EXPENSE APP ================= -->
  <div class="card" id="expenseSection">
    <div style="display: flex;justify-content: space-between;">

      <h2>Expense Tracker</h2>
      <div style="display: flex;gap: 5px;">
        <button id="premiumBtn" class="premium-btn">Buy Premium Membership</button>
        <h2 id="premiumStatusText">Premium Member</h2>
        <button onclick="logout()">Logout</button>
      </div>
    </div>


    <form id="expenseForm">

      <div class="form-group">
        <label>Money Spent</label>
        <input type="number" id="amount" required>
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea id="description" required></textarea>
      </div>

      <div>
        <label>Expense Creation Date</label>
        <input type="date" id="expenseCreationDate" required>
      </div>

      <button style="margin-top: 1rem;" type="submit">Add Expense</button>

    </form>

    <div class="form-group" style="margin-top: 2rem;">
      <label>Generate Report</label>
      <select id="category" value="daily" onchange="switchView(this.value)">
        <option value="daily">Daily</option>
        <option value="weekly">Weekly</option>
         <option value="monthly">Monthly</option>
      </select>
    </div>
    <table>
      <thead id="tableHeader">
        <tr>
          <th>Date</th>
          <th>Amount</th>
          <th>Description</th>
          <th>Category</th>
        </tr>
      </thead>

      <tbody id="expenseTable"></tbody>
    </table>
    <div id="pagination"></div>
    <button style="margin-top: 1rem;" id="downloadReportBtn" onclick="downloadTableAsCSV()">Download CSV Report</button>
    <button type="button" id="leaderboardBtn">Show Leaderboard</button>
  </div>
 
  <form id="geminiForm" style="padding: 2rem; display: none;">
    <h1>Ask Gemini</h1>
    <div class="form-group">
      <label>Question</label>
      <input type="text" id="prompt" placeholder="Ask something..." required />
    </div>
    <button type="submit">Ask Gemini</button>
  </form>
  <p id="response"></p>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>
  <script src="index.js"></script>
</body>

</html>
